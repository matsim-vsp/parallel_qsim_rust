modules:
  network:
    type: Network
    path: network.xml
  population:
    type: Population
    path: plans.xml
  vehicles:
    type: Vehicles
    path: vehicles.xml
  partitioning:
    type: Partitioning
    num_parts: 1
    method: None
  output:
    type: Output
    output_dir: ./rust_qsim/test_output/test
    write_events: Proto
  routing:
    type: Routing
    mode: UsePlans
  simulation:
    type: Simulation
    start_time: 0
    end_time: 86400
    sample_size: 1.0
    stuck_threshold: 1000
    main_modes:
      - car
