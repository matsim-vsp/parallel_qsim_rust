syntax = "proto3";
package routing;

import "matsim/simulation/io/types/population.proto";
import "matsim/simulation/io/types/general.proto";
import "google/protobuf/empty.proto";

service RoutingService {
  rpc GetRoute (Request) returns (Response);
  rpc Shutdown (google.protobuf.Empty) returns (google.protobuf.Empty);
}

message Request {
  string person_id = 1;
  string from_link_id = 2;
  .matsim.simulation.io.types.Coordinate from = 3;
  .matsim.simulation.io.types.Coordinate to = 5;
  string to_link_id = 7;
  string mode = 8;
  // Simulation clock instant in nanoseconds since simulation start.
  uint64 departure_time_ns = 9;
  // Simulation clock instant in nanoseconds since simulation start.
  uint64 now_ns = 10;
  bytes request_id = 11;
}

message Response {
  repeated .matsim.simulation.io.types.Leg legs = 1;
  repeated .matsim.simulation.io.types.Activity activities = 2;
  bytes request_id = 3;
}
