syntax = "proto3";
package events;

import "simulation/io/proto/types/general.proto";

message TimeStep {
  // Simulation clock instant in nanoseconds since simulation start.
  uint64 time_ns = 1;
  bytes data = 2;
}

message GenericEvent {
  string type = 1;
  map<string, general.AttributeValue> attributes = 2;
}
