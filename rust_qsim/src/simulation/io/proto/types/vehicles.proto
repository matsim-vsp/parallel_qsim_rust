syntax = "proto3";
import "simulation/io/proto/types/general.proto";

package vehicles;

message VehiclesContainer {
  repeated VehicleType vehicle_types = 1;
  repeated Vehicle vehicles = 2;
}

message VehicleType {
  uint64 id = 1;
  double length = 2;
  double width = 3;
  double max_v = 4;
  double pce = 5;
  double fef = 6;
  uint64 net_mode = 7;
}

message Vehicle {
  uint64 id = 1;
  uint64 type = 2;
  double max_v = 3;
  double pce = 4;
  map<string, general.AttributeValue> attributes = 5;
}