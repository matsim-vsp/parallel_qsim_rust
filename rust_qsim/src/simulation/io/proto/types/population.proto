syntax = "proto3";
import "simulation/io/proto/types/general.proto";

package population;

message Header {
  uint32 version = 1;
  uint32 size = 2;
}

message Person {
  string id = 1;
  repeated Plan plan = 2;
  map<string, general.AttributeValue> attributes = 3;
  optional string subpopulation = 4;
}

message Plan {
  bool selected = 1;
  repeated Leg legs = 2;
  repeated Activity acts = 3;
  optional double score = 4;
}

message Activity {
  string act_type = 1;
  string link_id = 2;
  optional general.Coordinate coordinate = 3;
  // Simulation clock instant in nanoseconds since simulation start.
  optional uint64 start_time_ns = 5;
  // Simulation clock instant in nanoseconds since simulation start.
  optional uint64 end_time_ns = 6;
  // Duration in nanoseconds.
  optional uint64 max_dur_ns = 7;
  map<string, general.AttributeValue> attributes = 8;
}

message Leg {
  string mode = 1;
  optional string routing_mode = 2;
  // Simulation clock instant in nanoseconds since simulation start.
  optional uint64 dep_time_ns = 3;
  // Duration in nanoseconds.
  optional uint64 trav_time_ns = 4;
  map<string, general.AttributeValue> attributes = 6;
  oneof route {
    GenericRoute generic_route = 7;
    NetworkRoute network_route = 8;
    PtRoute pt_route = 9;
  };
}

message GenericRoute {
  string start_link = 1;
  string end_link = 2;
  // Duration in nanoseconds.
  optional uint64 trav_time_ns = 3;
  optional double distance = 4;
  optional string veh_id = 5;
}

message NetworkRoute {
  GenericRoute delegate = 1;
  repeated string route = 2;
}

message PtRoute {
  GenericRoute delegate = 1;
  PtRouteDescription information = 2;
}

message PtRouteDescription {
  string transit_route_id = 1;
  // Duration in nanoseconds.
  optional uint64 boarding_time_ns = 2;
  string transit_line_id = 3;
  string access_facility_id = 4;
  string egress_facility_id = 5;
}
